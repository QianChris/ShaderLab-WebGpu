<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShaderLab-WebGPU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', monospace; }

        #app { display: flex; width: 100vw; height: 100vh; }

        #canvas-wrap { flex: 1; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }

        #info {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            color: #fff; font-family: monospace; font-size: 12px;
            background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 6px;
            pointer-events: none; z-index: 10;
        }
        #error {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: #ff6b6b; font-family: monospace; font-size: 14px; text-align: center;
            display: none; z-index: 10;
        }

        /* Sidebar + tabs */
        #sidebar {
            min-width:300px; max-width:340px; height:100vh;
            background:#16213e; border-left:1px solid #2a3a5c; color:#ccc;
            font-size:12px; flex-shrink:0; display:flex; flex-direction:column;
        }
        #tabs { display:flex; flex-shrink:0; border-bottom:1px solid #2a3a5c; }
        .tab-btn {
            flex:1; padding:8px; background:#16213e; color:#8899aa;
            border:none; border-bottom:2px solid transparent; cursor:pointer;
            font-size:12px; font-family:inherit;
        }
        .tab-btn:hover { color:#fff; }
        .tab-btn.active { color:#fff; background:#1a2744; border-bottom-color:#4a8fc7; }
        .tab-panel { flex:1; overflow-y:auto; display:flex; flex-direction:column; min-height:0; }

        /* Editor Panel */
        #editor { display:flex; flex-direction:column; flex:1; min-height:0; color:#ccc; font-size:12px; }
        #pipeline-panel { display:flex; flex-direction:column; flex:1; min-height:0; }

        /* Pipeline Panel */
        .pp-phase { margin:6px 6px 10px; }
        .pp-phase-title {
            color:#7ec8e3; font-size:10px; font-weight:700; padding:4px 2px;
            text-transform:uppercase; letter-spacing:0.6px;
            border-bottom:1px solid #2a3a5c; margin-bottom:4px;
        }
        .pp-empty { color:#556; font-size:10px; padding:1px 4px; font-style:italic; }
        .pp-entry-wrap { margin-bottom:3px; }
        .pp-entry {
            display:flex; align-items:center; gap:6px; padding:4px 8px;
            border:1px solid #2a3a5c; border-radius:4px; background:#1a2744;
        }
        .pp-entry input[type=checkbox] { cursor:pointer; }
        .pp-entry-name { flex:1; color:#ddd; }
        .pp-entry-kind { color:#667; font-size:9px; text-transform:uppercase; }
        .pp-params { display:flex; align-items:center; gap:3px; padding:3px 8px 2px 24px; }
        .pp-param-label { color:#888; font-size:10px; margin-right:4px; }
        .pp-config { padding:4px 8px 4px 24px; display:flex; flex-direction:column; gap:3px; }
        .pp-config-row { display:flex; align-items:center; gap:6px; }
        .pp-config-label { color:#889; font-size:10px; width:88px; flex-shrink:0; }
        .ed-select {
            flex:1; background:#0f1a30; color:#cde; border:1px solid #2a3a5c;
            border-radius:3px; font-size:10px; padding:2px 4px; cursor:pointer;
        }
        .ed-check { cursor:pointer; }
        .editor-head {
            padding:8px 10px; border-bottom:1px solid #2a3a5c;
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; background:#16213e; z-index:2;
        }
        .ed-title { color:#fff; font-weight:600; font-size:13px; }
        .editor-btn-row { display:flex; gap:4px; }
        .editor-btn {
            padding:3px 8px; font-size:11px; background:#2a3a5c; color:#ccc;
            border:1px solid #3a4a6c; border-radius:4px; cursor:pointer;
        }
        .editor-btn:hover { background:#3a4a6c; color:#fff; }

        /* Entity list */
        .ed-ent-list {
            border-bottom:1px solid #2a3a5c;
            flex:1 1 50%; min-height:0; display:flex; flex-direction:column;
        }
        .ed-ent-list-head {
            display:flex; justify-content:space-between; align-items:center;
            padding:6px 10px; color:#7ec8e3; font-weight:500; font-size:11px;
            flex-shrink:0;
        }
        .ed-ent-list-actions { display:flex; gap:2px; }
        .ed-ent-rows { flex:1; min-height:0; overflow-y:auto; }
        .ed-ent-row {
            padding:5px 10px; cursor:pointer; border-top:1px solid #1e2d44;
            display:flex; align-items:center;
        }
        .ed-ent-row:hover { background:#1e2d44; }
        .ed-ent-sel { background:#1e2d44; border-left:2px solid #4a8fc7; }
        .ed-ent-name { flex:1; }

        /* Detail */
        .ed-detail { flex:1 1 50%; min-height:0; overflow-y:auto; }
        .ed-detail-head {
            padding:6px 10px; color:#7ec8e3; font-size:11px; font-weight:500;
            border-bottom:1px solid #1e2d44;
        }

        .ed-comp { margin:0 6px 3px; border:1px solid #2a3a5c; border-radius:4px; overflow:hidden; }
        .ed-comp-off { opacity:0.45; }
        .ed-comp-head {
            padding:3px 8px; background:#1a2744; display:flex; align-items:center;
            gap:5px; font-size:11px; color:#7ec8e3;
        }
        .ed-comp-head input[type=checkbox] { cursor:pointer; }
        .ed-lock { font-size:10px; }

        .ed-fields { padding:2px 0; }
        .ed-field-row {
            display:flex; align-items:center; padding:2px 8px;
        }
        .ed-field-label {
            color:#888; font-size:10px; min-width:52px; text-align:right;
            padding-right:8px; flex-shrink:0;
        }
        .ed-field-inputs { display:flex; gap:2px; flex:1; }
        .ed-input, .ed-vec-input {
            background:#0d1b33; color:#ddd; border:1px solid #2a3a5c;
            padding:2px 5px; font-size:11px; border-radius:3px; font-family:monospace;
            flex:1; min-width:0;
        }
        .ed-vec-input { width:46px; flex:none; }
        .ed-input:focus, .ed-vec-input:focus { border-color:#4a8fc7; outline:none; }
        .ed-input::-webkit-inner-spin-button,
        .ed-input::-webkit-outer-spin-button { appearance:none; margin:0; }
        .ed-input[type=number] { appearance:textfield; }

        .ed-float-wrap {
            background:#0d1b33; border:1px solid #2a3a5c; border-radius:3px;
            flex:1; min-width:0; display:flex; align-items:center;
        }
        .ed-float-val {
            padding:2px 5px; font-size:11px; font-family:monospace; color:#ddd;
            cursor:ew-resize; user-select:none; width:100%; display:block;
            text-align:center;
        }
        .ed-float-edit {
            background:#0d1b33; color:#ddd; border:none;
            padding:2px 5px; font-size:11px; border-radius:3px; font-family:monospace;
            flex:1; min-width:0;
        }
        .ed-float-edit:focus { border-color:#4a8fc7; outline:none; }
        .ed-float-edit::-webkit-inner-spin-button,
        .ed-float-edit::-webkit-outer-spin-button { appearance:none; margin:0; }
        .ed-float-wrap input[type=number] { appearance:textfield; }
    </style>
</head>
<body>
    <div id="app">
        <div id="canvas-wrap">
            <div id="info">ShaderLab-WebGPU | WebGPU</div>
            <div id="error"></div>
            <canvas id="canvas"></canvas>
        </div>
        <div id="sidebar">
            <div id="tabs">
                <button class="tab-btn active" data-tab="scene">Scene</button>
                <button class="tab-btn" data-tab="pipeline">Pipeline</button>
            </div>
            <div id="tab-scene" class="tab-panel" style="display:flex;">
                <div id="editor"></div>
            </div>
            <div id="tab-pipeline" class="tab-panel" style="display:none;">
                <div id="pipeline-panel"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
